name: iOS Verify (Build + Test)

on:
  push:
    branches: [main]
  # 可选: PR 触发
  # pull_request:
  #   branches: [main]

# 防止同时跑 (同一分支)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: macos-14   # M1 runner, 更快

    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app
        # 锁定 Xcode 版本, 防 Apple 升级默认 Xcode 引入新警告

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved', '**/Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Cache CocoaPods
        if: hashFiles('**/Podfile.lock') != ''
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/CocoaPods
          key: ${{ runner.os }}-pods-${{ hashFiles('**/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Install CocoaPods
        if: hashFiles('**/Podfile.lock') != ''
        run: |
          gem install cocoapods --no-document
          pod install --repo-update

      - name: Generate Xcode Project (xcodegen)
        if: hashFiles('**/project.yml') != ''
        run: |
          brew install xcodegen
          xcodegen generate

      # --- 自动检测 workspace / project (任意 iOS App 项目) ---
      - name: Auto-detect Workspace/Project
        id: detect_project
        run: |
          set -e
          # 优先 .xcworkspace (CocoaPods/SPM workspace), 退回 .xcodeproj
          if [ -n "$(ls -d *.xcworkspace 2>/dev/null | head -1)" ]; then
            WORKSPACE=$(ls -d *.xcworkspace | head -1)
            echo "workspace=$WORKSPACE" >> $GITHUB_OUTPUT
            echo "✅ Found workspace: $WORKSPACE"
          elif [ -n "$(ls -d *.xcodeproj 2>/dev/null | head -1)" ]; then
            PROJECT=$(ls -d *.xcodeproj | head -1)
            echo "project=$PROJECT" >> $GITHUB_OUTPUT
            echo "✅ Found project: $PROJECT"
          else
            echo "❌ No .xcworkspace or .xcodeproj found"
            ls -la
            exit 1
          fi

      # --- 自动检测 scheme (从 workspace/project 列出的 scheme 选第一个) ---
      - name: Auto-detect Scheme
        id: detect_scheme
        run: |
          set -e
          if [ -n "${{ steps.detect_project.outputs.workspace }}" ]; then
            PROJECT_ARG="-workspace ${{ steps.detect_project.outputs.workspace }}"
          else
            PROJECT_ARG="-project ${{ steps.detect_project.outputs.project }}"
          fi

          SCHEME=$(xcodebuild -list $PROJECT_ARG 2>/dev/null | awk '/Schemes:/{flag=1; next} flag && NF && $1 !~ /^$/{print $1; exit}')
          if [ -z "$SCHEME" ]; then
            echo "❌ No scheme found in:"
            xcodebuild -list $PROJECT_ARG
            exit 1
          fi
          echo "scheme=$SCHEME" >> $GITHUB_OUTPUT
          echo "✅ Found scheme: $SCHEME"

      - name: Build (Debug, iPhone Simulator)
        run: |
          set -o pipefail
          if [ -n "${{ steps.detect_project.outputs.workspace }}" ]; then
            PROJECT_ARG="-workspace ${{ steps.detect_project.outputs.workspace }}"
          else
            PROJECT_ARG="-project ${{ steps.detect_project.outputs.project }}"
          fi

          xcodebuild build \
            $PROJECT_ARG \
            -scheme "${{ steps.detect_scheme.outputs.scheme }}" \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

      - name: Test (Unit Tests)
        run: |
          set -o pipefail
          if [ -n "${{ steps.detect_project.outputs.workspace }}" ]; then
            PROJECT_ARG="-workspace ${{ steps.detect_project.outputs.workspace }}"
          else
            PROJECT_ARG="-project ${{ steps.detect_project.outputs.project }}"
          fi

          xcodebuild test \
            $PROJECT_ARG \
            -scheme "${{ steps.detect_scheme.outputs.scheme }}" \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

      - name: SwiftLint
        run: |
          if [ -f .swiftlint.yml ]; then
            brew install swiftlint
            swiftlint lint --strict
          else
            echo "⚠️  No .swiftlint.yml found, skipping"
          fi
