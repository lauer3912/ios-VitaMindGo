name: Build & Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-14
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1

      - name: List Available Schemas
        run: |
          xcodebuild -project VitaMind.xcodeproj -list

      - name: Build & Test
        run: |
          mkdir -p .build
          rm -rf .build/DerivedData

          echo "=== Building with generic iOS Simulator destination ==="
          xcodebuild \
            -project VitaMind.xcodeproj \
            -scheme VitaMind \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath .build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            build \
            2>&1 | tee .build/build.log

          RESULT=${PIPESTATUS[0]}
          echo "Exit code: $RESULT"

          if [ $RESULT -ne 0 ]; then
            echo "=== Build failed, last 200 lines ==="
            tail -200 .build/build.log
            exit 1
          fi
          echo "Build and test succeeded"

      - name: Upload Test Results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: .build/build.log
          if-no-files-found: error