name: TestFlight Upload

on:
  workflow_dispatch:

jobs:
  build-and-upload:
    runs-on: macos-14
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1

      - name: Check for Certificates and API Key
        id: check_certs
        run: |
          echo "=== Checking .github/certs/ directory ==="
          ls -la .github/certs/

          if [ ! -f ".github/certs/szf_exported_cert.p12" ]; then
            echo "ERROR: szf_exported_cert.p12 NOT FOUND"
            ls -la .github/certs/ || true
            exit 1
          fi
          echo "✓ szf_exported_cert.p12 found"

          if [ ! -f ".github/certs/AuthKey_H3973L93M5.p8" ]; then
            echo "ERROR: AuthKey_H3973L93M5.p8 NOT FOUND"
            ls -la .github/certs/ || true
            exit 1
          fi
          echo "✓ AuthKey_H3973L93M5.p8 found"

          echo "CERT_FILE_SIZE=$(stat -f%z .github/certs/szf_exported_cert.p12)" >> $GITHUB_OUTPUT
          echo "API_KEY_FILE_SIZE=$(stat -f%z .github/certs/AuthKey_H3973L93M5.p8)" >> $GITHUB_OUTPUT

      - name: Compute Certificate Base64
        id: compute_cert
        run: |
          echo "=== Compute Certificate Base64 ==="

          CERT_FILE=".github/certs/szf_exported_cert.p12"

          if [ ! -f "$CERT_FILE" ]; then
            echo "ERROR: Certificate file not found at $CERT_FILE"
            exit 1
          fi

          FILE_SIZE=$(stat -f%z "$CERT_FILE")
          echo "Certificate file size: $FILE_SIZE bytes"

          if [ "$FILE_SIZE" -lt 1000 ]; then
            echo "ERROR: Certificate file seems too small ($FILE_SIZE bytes)"
            exit 1
          fi

          CERT_B64=$(base64 -i "$CERT_FILE" | tr -d '\n')

          echo "CERT_B64 length: ${#CERT_B64}"

          if [ ${#CERT_B64} -lt 1000 ]; then
            echo "ERROR: Certificate Base64 seems too short (${#CERT_B64} chars)"
            exit 1
          fi

          # Use GITHUB_OUTPUT to set output for next step
          echo "CERT_B64=$CERT_B64" >> $GITHUB_OUTPUT
          echo "✓ Certificate Base64 computed: ${#CERT_B64} characters"

      - name: Copy Provisioning Profiles
        run: |
          echo "=== Copy Provisioning Profiles ==="
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"

          if [ -f ".github/profiles/VitaMind_App_Store.mobileprovision" ]; then
            cp ".github/profiles/VitaMind_App_Store.mobileprovision" \
               "$HOME/Library/MobileDevice/Provisioning Profiles/"
            echo "✓ Provisioning profile copied"
          else
            echo "⚠ No provisioning profile found, will use automatic signing"
          fi

          echo "=== Current Provisioning Profiles ==="
          ls -la "$HOME/Library/MobileDevice/Provisioning Profiles/"

      - name: Import Code-Signing Certificates
        run: |
          echo "=== Import Code-Signing Certificates ==="

          if [ -z "${{ steps.compute_cert.outputs.CERT_B64 }}" ]; then
            echo "ERROR: CERT_B64 is empty"
            exit 1
          fi

          echo "CERT_B64 length: ${{ steps.compute_cert.outputs.CERT_B64 }}"
          echo "Importing certificate..."

      - name: Import Certificate via Apple Actions
        uses: Apple-Actions/import-codesign-certs@v7
        with:
          p12-file-base64: ${{ steps.compute_cert.outputs.CERT_B64 }}
          p12-password: ${{ secrets.CERTIFICATE_PASSWORD }}

      - name: Copy API Key
        run: |
          echo "=== Copy API Key ==="
          mkdir -p "$HOME/.appstoreconnect/private_keys"

          if [ ! -f ".github/certs/AuthKey_H3973L93M5.p8" ]; then
            echo "ERROR: API key file not found"
            exit 1
          fi

          cp ".github/certs/AuthKey_H3973L93M5.p8" \
             "$HOME/.appstoreconnect/private_keys/ApiKey_H3973L93M5.p8"
          chmod 600 "$HOME/.appstoreconnect/private_keys/ApiKey_H3973L93M5.p8"

          if [ ! -f "$HOME/.appstoreconnect/private_keys/ApiKey_H3973L93M5.p8" ]; then
            echo "ERROR: API key copy failed"
            exit 1
          fi

          echo "✓ API key copied successfully"
          ls -la "$HOME/.appstoreconnect/private_keys/"

      - name: Build Archive
        run: |
          echo "=== Build Archive ==="
          mkdir -p build

          xcodebuild \
            -project VitaMind.xcodeproj \
            -scheme VitaMind \
            -configuration Release \
            -archivePath build/VitaMind.xcarchive \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=9L6N2ZF26B \
            -allowProvisioningUpdates \
            archive 2>&1 | tee build/archive.log

          RESULT=${PIPESTATUS[0]}
          echo "Exit code: $RESULT"

          if [ $RESULT -ne 0 ]; then
            echo "=== Build FAILED, last 100 lines ==="
            tail -100 build/archive.log
            exit 1
          fi

          if [ ! -f "build/VitaMind.xcarchive" ]; then
            echo "ERROR: Archive file not created"
            ls -la build/
            exit 1
          fi

          echo "✓ Archive completed successfully"
          echo "=== Build output ==="
          ls -la build/

      - name: Upload to TestFlight
        run: |
          echo "=== Upload to TestFlight ==="
          echo "Archive: build/VitaMind.xcarchive"
          echo "API Key ID: H3973L93M5"
          echo "Team ID: 9L6N2ZF26B"
          echo "Note: Full TestFlight upload requires altool configuration"