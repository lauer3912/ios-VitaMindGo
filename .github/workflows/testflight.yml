name: TestFlight Upload

on:
  workflow_dispatch:

jobs:
  build-and-upload:
    runs-on: macos-14
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.5.0"

      - name: Check for Certificates and API Key
        id: check_certs
        run: |
          if [ -f ".github/certs/szf_exported_cert.p12" ] && [ -f ".github/certs/AuthKey_${{ vars.APPSTORE_API_KEY_ID }}.p8" ]; then
            echo "CERT_EXISTS=true" >> $GITHUB_ENV
          else
            echo "CERT_EXISTS=false" >> $GITHUB_ENV
            echo "⚠️ Certificates or API Key not found in .github/certs/"
            echo "Please upload your certificates and API key to .github/certs/ directory"
            echo "Required files:"
            echo "  - .github/certs/szf_exported_cert.p12 (Code signing certificate)"
            echo "  - .github/certs/AuthKey_{APPSTORE_API_KEY_ID}.p8 (App Store Connect API key)"
          fi

      - name: Copy Provisioning Profiles
        if: env.CERT_EXISTS == 'true'
        run: |
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp ".github/profiles/VitaMind_App_Store.mobileprovision" \
             "$HOME/Library/MobileDevice/Provisioning Profiles/" 2>/dev/null || \
            echo "No provisioning profile found, will use automatic signing"
          echo "Profile check complete"

      - name: Compute Certificate Base64
        if: env.CERT_EXISTS == 'true'
        run: |
          CERT_B64=$(base64 -i .github/certs/szf_exported_cert.p12 | tr -d '\n')
          echo "CERT_B64=$CERT_B64" >> $GITHUB_ENV

      - name: Import Code-Signing Certificates
        if: env.CERT_EXISTS == 'true'
        uses: Apple-Actions/import-codesign-certs@v7
        with:
          p12-file-base64: ${{ env.CERT_B64 }}
          p12-password: ${{ secrets.CERTIFICATE_PASSWORD }}

      - name: Build Archive
        run: |
          mkdir -p build
          xcrun xcodebuild \
            -project VitaMind.xcodeproj \
            -scheme VitaMind \
            -configuration Release \
            -archivePath build/VitaMind.xcarchive \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=9L6N2ZF26B \
            archive 2>&1 | tee build/archive.log
          echo "Archive completed"

      - name: Upload to TestFlight
        if: env.CERT_EXISTS == 'true'
        run: |
          echo "Uploading to TestFlight..."
          # Note: This step requires App Store Connect API key setup
          echo "TestFlight upload requires App Store Connect API key configuration"
          echo "Please use Xcode GUI for manual upload, or configure API key in .github/certs/"