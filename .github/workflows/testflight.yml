name: TestFlight Upload

on:
  workflow_dispatch:

jobs:
  build-and-upload:
    runs-on: macos-14
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1

      - name: Check for Certificates and API Key
        id: check_certs
        run: |
          echo "=== Checking .github/certs/ directory ==="
          ls -la .github/certs/

          if [ ! -f ".github/certs/szf_exported_cert.p12" ]; then
            echo "ERROR: szf_exported_cert.p12 NOT FOUND"
            exit 1
          fi
          echo "✓ szf_exported_cert.p12 found"

          if [ ! -f ".github/certs/AuthKey_H3973L93M5.p8" ]; then
            echo "ERROR: AuthKey_H3973L93M5.p8 NOT FOUND"
            exit 1
          fi
          echo "✓ AuthKey_H3973L93M5.p8 found"

          echo "CERT_FILE_SIZE=$(stat -f%z .github/certs/szf_exported_cert.p12)" >> $GITHUB_OUTPUT

      - name: Compute Certificate Base64
        id: compute_cert
        run: |
          CERT_FILE=".github/certs/szf_exported_cert.p12"
          FILE_SIZE=$(stat -f%z "$CERT_FILE")
          echo "Certificate file size: $FILE_SIZE bytes"

          CERT_B64=$(base64 -i "$CERT_FILE" | tr -d '\n')
          echo "CERT_B64 length: ${#CERT_B64}"

          if [ ${#CERT_B64} -lt 1000 ]; then
            echo "ERROR: Certificate Base64 too short"
            exit 1
          fi

          echo "CERT_B64=$CERT_B64" >> $GITHUB_OUTPUT
          echo "✓ Certificate Base64 computed"

      - name: Add Apple ID to Keychain
        run: |
          echo "=== Add Apple ID to Keychain ==="
          # Unlock login keychain first
          security unlock-keychain -p "" ~/Library/Keychains/login.keychain-db
          security set-keychain-settings -lut 21600 ~/Library/Keychains/login.keychain-db
          
          # Add Apple ID internet password to keychain
          # This makes the account available to Xcode for Automatic signing
          security add-internet-password \
            -s "apple.com" \
            -r "dflt" \
            -a "${{ secrets.APPLE_ID_USERNAME }}" \
            -w "${{ secrets.APPLE_ID_PASSWORD }}" \
            -T "/Applications/Xcode.app/Contents/Developer/usr/bin/xcodebuild" \
            -T "/usr/bin/security" \
            ~/Library/Keychains/login.keychain-db 2>&1 || echo "Note: security add may fail if already exists"
          
          echo "=== Verify Apple ID in keychain ==="
          security find-internet-password -s "apple.com" -a "${{ secrets.APPLE_ID_USERNAME }}" 2>&1 | head -5 || true
          echo "✓ Apple ID added to keychain"

      - name: Copy Provisioning Profiles
        run: |
          echo "=== Copy Provisioning Profiles ==="
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"

          if [ -f ".github/profiles/VitaMind_App_Store.mobileprovision" ]; then
            cp ".github/profiles/VitaMind_App_Store.mobileprovision" \
               "$HOME/Library/MobileDevice/Provisioning Profiles/"
            echo "✓ VitaMind_App_Store.mobileprovision copied"
          else
            echo "ERROR: VitaMind_App_Store.mobileprovision not found"
            exit 1
          fi
          
          if [ -f ".github/profiles/VitaMindWidget_App_Store.mobileprovision" ]; then
            cp ".github/profiles/VitaMindWidget_App_Store.mobileprovision" \
               "$HOME/Library/MobileDevice/Provisioning Profiles/"
            echo "✓ VitaMindWidget_App_Store.mobileprovision copied"
          else
            echo "ERROR: VitaMindWidget_App_Store.mobileprovision not found"
            exit 1
          fi

          echo "=== Current Provisioning Profiles ==="
          ls -la "$HOME/Library/MobileDevice/Provisioning Profiles/"

      - name: Import Certificate via Apple Actions
        uses: Apple-Actions/import-codesign-certs@v7
        with:
          p12-file-base64: ${{ steps.compute_cert.outputs.CERT_B64 }}
          p12-password: ${{ secrets.CERTIFICATE_PASSWORD }}
          create-keychain: true
          keychain-password: ""

      - name: Setup Keychain for Build
        run: |
          security list-keychains -d user -s signing_temp.keychain-db login.keychain-db
          security default-keychain -s signing_temp.keychain-db
          security unlock-keychain -p "" signing_temp.keychain-db
          
          echo "=== Available Signing Identities ==="
          security find-identity -v -p codesigning signing_temp.keychain-db

      - name: Copy API Key
        run: |
          echo "=== Copy API Key ==="
          mkdir -p "$HOME/.appstoreconnect/private_keys"

          if [ ! -f ".github/certs/AuthKey_H3973L93M5.p8" ]; then
            echo "ERROR: API key file not found"
            exit 1
          fi

          cp ".github/certs/AuthKey_H3973L93M5.p8" \
             "$HOME/.appstoreconnect/private_keys/ApiKey_H3973L93M5.p8"
          chmod 600 "$HOME/.appstoreconnect/private_keys/ApiKey_H3973L93M5.p8"
          echo "✓ API key copied"

      - name: Build Archive
        run: |
          echo "=== Build Archive ==="
          mkdir -p build

          # CODE_SIGN_STYLE=Manual + certificate in keychain
          # Xcode will automatically find matching profile by DEVELOPMENT_TEAM + Bundle ID
          # DO NOT use PROVISIONING_PROFILE_SPECIFIER - that causes the IsXcodeManaged conflict
          xcrun xcodebuild \
            -project VitaMind.xcodeproj \
            -scheme VitaMind \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM=9L6N2ZF26B \
            -allowProvisioningUpdates \
            archive 2>&1 | tee build/archive.log
          
          echo "Archive exit code: ${PIPESTATUS[0]}"
          
          if [ ! -f "build/VitaMind.xcarchive" ]; then
            echo "=== Build FAILED, last 100 lines ==="
            tail -100 build/archive.log
            exit 1
          fi

          echo "✓ Archive completed successfully"
          ls -la build/VitaMind.xcarchive

      - name: Upload to TestFlight
        run: |
          echo "=== Upload to TestFlight ==="
          echo "Archive: build/VitaMind.xcarchive"
          echo "API Key ID: H3973L93M5"
          echo "Team ID: 9L6N2ZF26B"
          echo "Note: Full TestFlight upload requires altool configuration"